<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Gioco Sport CAA - Finale</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --error: #e74c3c;
            --highlight: #f1c40f;
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            /* CORREZIONE: Ora punta a .png */
            background-image: url('sfondo.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Colore di sicurezza se l'immagine sparisce */
            background-color: #f0f0f0; 
        }

        #game-container {
            background-color: rgba(255, 255, 255, 0.94);
            width: 85%;
            max-width: 650px;
            border-radius: 30px;
            border: 8px solid var(--primary);
            padding: 25px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        #consegna {
            background: #fff;
            border: 5px solid var(--primary);
            border-radius: 20px;
            margin: 15px 0;
            padding: 15px;
            display: inline-block;
        }

        #target-image {
            width: 170px;
            height: 170px;
            object-fit: contain;
        }

        .griglia {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .tasto-sport {
            background: white;
            border: 4px solid #ddd;
            border-radius: 25px;
            padding: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tasto-sport img { width: 100px; height: 100px; object-fit: contain; }
        .tasto-sport b { display: block; margin-top: 8px; font-size: 18px; }
        .tasto-sport.corretto { background: var(--success); border-color: #27ae60; }
        .tasto-sport.sbagliato { background: var(--error); border-color: #c0392b; }

        #victory-overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #victory-overlay img { width: 250px; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="punteggio" style="font-weight: bold;">PUNTI: 0 / 6</div>
        <h2 style="margin: 10px 0;">CERCA QUESTO SPORT:</h2>
        
        <div id="consegna">
            <img src="" id="target-image" alt="">
        </div>

        <div class="griglia" id="grid"></div>
        <div id="messaggio" style="font-size: 24px; margin-top: 15px; font-weight: bold; height: 35px;"></div>
    </div>

    <div id="victory-overlay">
        <img src="vittoria.png" alt="Coppa">
        <h1>BRAVO! HAI VINTO!</h1>
        <button onclick="location.reload()" style="padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 10px;">GIOCA ANCORA</button>
    </div>

    <script>
        const listaSport = [
            { nome: 'PADEL', file: 'padel.png' },
            { nome: 'SCHERMA', file: 'scherma.png' },
            { nome: 'DANZA', file: 'danza.png' },
            { nome: 'RUGBY', file: 'rugby.png' },
            { nome: 'CALCIO', file: 'calcio.png' },
            { nome: 'ATLETICA', file: 'atletica.png' },
            { nome: 'PALLAVOLO', file: 'pallavolo.png' },
            { nome: 'BASKET', file: 'basket.png' }
        ];

        let punti = 0;
        let targetAttuale = {};

        function parla(testo) {
            const m = new SpeechSynthesisUtterance(testo);
            m.lang = 'it-IT';
            window.speechSynthesis.speak(m);
        }

        function nuovoRound() {
            if (punti >= 6) {
                document.getElementById('victory-overlay').style.display = 'flex';
                parla("Bravissimo! Hai vinto!");
                return;
            }
            const casuali = [...listaSport].sort(() => 0.5 - Math.random()).slice(0, 4);
            targetAttuale = casuali[Math.floor(Math.random() * 4)];
            document.getElementById('target-image').src = targetAttuale.file;
            document.getElementById('messaggio').textContent = "";
            parla("Trova " + targetAttuale.nome);
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            casuali.forEach(s => {
                const div = document.createElement('div');
                div.className = 'tasto-sport';
                div.innerHTML = `<img src="${s.file}"><br><b>${s.nome}</b>`;
                div.onclick = () => {
                    if (s.nome === targetAttuale.nome) {
                        punti++;
                        div.classList.add('corretto');
                        document.getElementById('punteggio').textContent = `PUNTI: ${punti} / 6`;
                        parla("Esatto!");
                        setTimeout(nuovoRound, 1500);
                    } else {
                        div.classList.add('sbagliato');
                        parla("No, riprova.");
                        setTimeout(() => div.classList.remove('sbagliato'), 800);
                    }
                };
                grid.appendChild(div);
            });
        }
        window.onload = nuovoRound;
    </script>
</body>
</html>
